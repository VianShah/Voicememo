version: '3.8'

services:
  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    ports:
      - "9000:9000"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_GEMINI_API_KEY=${GEMINI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX}
      - EXPRESS_URL=http://server:3001
    volumes:
      - ./web/src:/app/src
    env_file:
      - .env

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=${PINECONE_INDEX}
      - WHISPER_API_URL=http://whisper:9000
    volumes:
      - ./server/src:/app/src
    env_file:
      - .env

